alias: "Solar: Master-Steuerung SunEnergy XT 500 Pro"
description: >
  V7.8: kp-Schwelle von 100W auf 50W gesenkt für schnellere Reaktion,
  continue_on_error, Filter-Reset im Sicherheits-Stopp,
  asymmetrischer Filter, Nachtmodus direkt haus_p, SOC-Schutz
triggers:
  - trigger: time_pattern
    seconds: "/5"
  - trigger: homeassistant
    event: start
actions:
  - variables:
      grid_p_raw: "{{ states('sensor.shellypro3em_leistung') | float(0) }}"
      grid_p_last: "{{ states('input_number.pid_regler_gefilterter_error_speicher') | float(0) }}"
      grid_p: >-
        {% if grid_p_raw < -30 %}
          {{ (grid_p_last * 0.30 + grid_p_raw * 0.70) | round(1) }}
        {% else %}
          {{ (grid_p_last * 0.85 + grid_p_raw * 0.15) | round(1) }}
        {% endif %}
      solar_p: "{{ (states('sensor.shellypro1pm_hoymiles_leistung') | float(0)) | abs }}"
      solar_p_last: "{{ states('input_number.solar_p_letzter_wert') | float(0) }}"
      solar_delta: "{{ solar_p - solar_p_last }}"
      haus_p: "{{ [states('sensor.hausverbrauch_aktuell') | float(0), 0] | max }}"
      curr_soc: "{{ states('sensor.sunenergyxt_500_pro_system_speicherlevel') | float(0) }}"
      curr_act: "{{ states('sensor.sunenergyxt_500_pro_systemleistung_am_netzanschluss') | float(0) }}"
      last_soll: "{{ states('number.sunenergyxt_500_pro_sollwert_leistung_netzanschluss') | float(0) }}"
      automatik: "{{ is_state('input_boolean.nulleinspeisung_automatik', 'on') }}"
      akku_volladen: "{{ is_state('input_boolean.akku_volladen', 'on') }}"
      last_upd: "{{ as_timestamp(states.sensor.shellypro3em_leistung.last_updated) | default(0) }}"
      watchdog_ok: "{{ (now().timestamp() - last_upd) < 60 }}"
      data_valid: >-
        {{ states('sensor.shellypro3em_leistung') not in ['unknown', 'unavailable'] and
           states('sensor.shellypro1pm_hoymiles_leistung') not in ['unknown', 'unavailable'] and
           states('sensor.sunenergyxt_500_pro_systemleistung_am_netzanschluss') not in ['unknown', 'unavailable'] }}
      letzte_v: "{{ state_attr('input_datetime.letzte_akku_volladung', 'timestamp') | default(0) }}"
      tage_seit: "{{ (now().timestamp() - letzte_v) / 86400 }}"
      solar_heute: "{{ states('sensor.energy_production_today_2') | float(0) }}"
      erzwinge_ladung: "{{ tage_seit > 15 and (solar_heute < 5 or now().hour >= 14) }}"
      min_soc: 18
      soc_schutz: "{{ curr_soc <= min_soc }}"
      nacht: "{{ solar_p < 20 }}"
      kp: 0.6
      ki: 0.04
      dt: "{{ [[( now().timestamp() - (states.number.sunenergyxt_500_pro_sollwert_leistung_netzanschluss.last_updated | as_timestamp(default=now().timestamp()) )), 1] | max, 30] | min }}"
      integ_raw: "{{ states('input_number.kopfspeicher_pi_integral') | float(0) }}"
      error: "{{ grid_p }}"
      p_term: >-
        {% if error | abs > 50 %}
          {{ kp * error }}
        {% else %}
          0
        {% endif %}
      i_term: "{{ ki * integ_raw * dt }}"
      raw_target: "{{ curr_act + p_term + i_term }}"
      max_step: 100
      rate_limited: >-
        {% set diff = raw_target - last_soll %}
        {% if diff > max_step %}
          {{ last_soll + max_step }}
        {% elif diff < -max_step %}
          {{ last_soll - max_step }}
        {% else %}
          {{ raw_target }}
        {% endif %}
      final_target: >-
        {% if soc_schutz %}
          0
        {% elif nacht %}
          {{ haus_p }}
        {% elif akku_volladen %}
          -600
        {% else %}
          {{ rate_limited }}
        {% endif %}
      final_target_rated: "{{ [[final_target, -600] | max, 600] | min | round(0) }}"
      n_integ_raw: "{{ integ_raw + error * dt }}"
      n_integ_final: "{{ [[n_integ_raw, -5000] | max, 5000] | min }}"
      deadband: >-
        {% if error | abs <= 10 %}
          im Deadband
        {% elif error > 0 %}
          Bezug
        {% else %}
          Einspeisung
        {% endif %}
      soll_schreiben: "{{ (final_target_rated - last_soll) | abs > 50 }}"

  - choose:
      # Sicherheits-Stopp: Automatik aus
      - conditions:
          - condition: template
            value_template: "{{ not automatik }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.pid_regler_gefilterter_error_speicher
            data:
              value: 0
          - action: input_number.set_value
            target:
              entity_id: input_number.kopfspeicher_pi_integral
            data:
              value: 0
          - stop: Automatik deaktiviert

      # Sicherheits-Stopp: Watchdog oder ungültige Daten
      - conditions:
          - condition: template
            value_template: "{{ not watchdog_ok or not data_valid }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.pid_regler_gefilterter_error_speicher
            data:
              value: 0
          - action: input_number.set_value
            target:
              entity_id: input_number.kopfspeicher_pi_integral
            data:
              value: 0
          - action: number.set_value
            target:
              entity_id: number.sunenergyxt_500_pro_sollwert_leistung_netzanschluss
            data:
              value: 0
            continue_on_error: true
          - stop: Watchdog / Datenfehler

      # Zwangsladung
      - conditions:
          - condition: template
            value_template: "{{ erzwinge_ladung and curr_soc < 100 }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.solar_p_letzter_wert
            data:
              value: "{{ solar_p | round(1) }}"
          - action: number.set_value
            target:
              entity_id: number.sunenergyxt_500_pro_sollwert_leistung_netzanschluss
            data:
              value: "{{ final_target_rated | int }}"
            continue_on_error: true
          - stop: Zwangsladung aktiv

    default:
      - action: input_number.set_value
        target:
          entity_id: input_number.pid_regler_gefilterter_error_speicher
        data:
          value: "{{ grid_p | round(1) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.solar_p_letzter_wert
        data:
          value: "{{ solar_p | round(1) }}"
      - action: input_select.select_option
        target:
          entity_id: input_select.deadband_status
        data:
          option: "{{ deadband | trim }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.kopfspeicher_pi_integral
        data:
          value: "{{ n_integ_final | round(2) }}"
      - if:
          - condition: template
            value_template: "{{ soll_schreiben }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.sunenergyxt_500_pro_sollwert_leistung_netzanschluss
            data:
              value: "{{ final_target_rated | int }}"
            continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ curr_soc >= 100 }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.letzte_akku_volladung
            data:
              timestamp: "{{ now().timestamp() | int }}"

mode: single
max_exceeded: silent
